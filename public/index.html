<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopZone — Modern E‑Commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Distinctive font pairing: Bebas Neue (display) + DM Sans (body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─── CSS Design Tokens ─── */
      :root {
        --clr-bg: #0a0a0a;
        --clr-surface: #141414;
        --clr-surface-2: #1e1e1e;
        --clr-accent: #f0c040;
        --clr-accent-dim: rgba(240, 192, 64, 0.15);
        --clr-text: #f0ede8;
        --clr-text-muted: #888;
        --clr-danger: #e05252;
        --clr-success: #52c97a;
        --radius: 10px;
        --transition: 0.22s ease;
        --font-display: 'Bebas Neue', sans-serif;
        --font-body: 'DM Sans', sans-serif;
        --nav-h: 64px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font-body);
        background: var(--clr-bg);
        color: var(--clr-text);
        min-height: 100vh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      a { color: inherit; text-decoration: none; }

      img { display: block; max-width: 100%; }

      button {
        font-family: var(--font-body);
        cursor: pointer;
        border: none;
        outline: none;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--clr-bg); }
      ::-webkit-scrollbar-thumb { background: var(--clr-surface-2); border-radius: 3px; }

      /* Utility */
      .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
      .accent { color: var(--clr-accent); }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
